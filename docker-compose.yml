
services:
  postgres:
    image: postgres:16-alpine
    container_name: cognify-db
    environment:
      POSTGRES_DB: cognify
      POSTGRES_USER: cognify
      POSTGRES_PASSWORD: cognify_local_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cognify -d cognify"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cognify-backend
    environment:
      DATABASE_URL: postgresql://cognify:cognify_local_password@postgres:5432/cognify
      JWT_SECRET: local-development-secret-change-in-production
      JWT_EXPIRES_IN: 7d
      OPENROUTER_MODEL: google/gemini-2.0-flash
      PORT: 3001
      NODE_ENV: development
    env_file:
      - ./backend/.env
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      sh -c "npx prisma migrate deploy && node dist/src/main"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: cognify-frontend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3001/api
      NEXT_PUBLIC_APP_NAME: Cognify
    ports:
      - "3000:3000"
    depends_on:
      - backend
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public

volumes:
  postgres_data:
